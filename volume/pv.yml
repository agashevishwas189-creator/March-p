apiVersion: v1 
kind: PersistentVolume 
metadata:
    name: my-volume
    labels:
        type: pv-volume   #app name
spec:
  storageClassName: standard  #type of storage use for pv its efs
  volumeMode: Filesystem
  capacity:
    storage: 20Gi
  accessModes:      #type of access mode for pv and should be same as pvc
          - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain  #specify the reclaim policy for pv and it can be Retain, Recycle, Delete
  hostPath:
      path: "/mnt/data"          #path where we want to mount the volume in the node
           
