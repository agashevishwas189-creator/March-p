apiVersion: v1 
kind: Deployment 
metadata: 
  name: rolling-deployment 
  namespace: devops
  Labels: 
    app: rolling-deployment
spec: 
  replicas: 5 
  selector: 
    matchLabels: 
      app: rolling-deployment
  strategy:
    type: RollingUpdate 
    rollingUpdate: 
      maxUnavailable: 2
      maxSurge: 2
  template: 
    metadata: 
      labels: 
        app: rolling-deployment 
    spec: 
      containers: 
        - name: rolling-container 
          image: httpd:latest 
          ports: 
            - containerPort: 80
---
apiVersion: v1 
kind: Namespace
metadata:
  name:  devops         
           