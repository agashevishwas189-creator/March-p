apiVersion : v1
kind : Pod
metadata : 
    name : nodeport-pod
    labels :
      app : nodeport-pod
spec :
  containers :
      name : my-container
      image : httpd:latest
      ports : 
        - containerport : 80
---

apiVersion : v1
kind : Service
metadata :
    name : nodeport-service
    labels :
      app : nodeport-service
spec : 
  type : NodePort
  selector :
      app : nodeport-pod
  ports :
  - protocol : TCP
    port : 80
    targetPort : 80      



