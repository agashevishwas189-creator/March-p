apiVersion : v1
kind : Pod
metadata : 
    name : my-pod
    Lables : 
      app : my-pod
spec :
  containers :
    - name : my-container
      image : httpd:latest
      ports: 
      - containerport : 80

---
apiVersion : v1
kind : Service
metadata :
    name : cluster-ip-service
    Lables :
      app : cluster-ip-service
spec :
  type : ClusterIP
  selector :
      app : my-pod
  ports :
     - protocol : TCP
       port : 80
       targetPort : 80