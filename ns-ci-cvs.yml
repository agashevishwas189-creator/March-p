apiVersion: v1 
kind: Namespace
metadata:
    name: nsci

---
apiVersion: v1 
kind: Pod
metadata: 
     name: ns-pod
     namespace: nsci
     labels: 
       app: ns-all
spec: 
  containers:
     - name: ns-container
       image: httpd:latest
       ports:
          -containerPort: 80  
---

apiVersion: v1 
kind: Service
metadata:
    name: nsci-service
    namespace: nsci
    labels:
      app: ns-all
spec:
  type: ClusterIP
  selector:
      app: ns-all
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80 
---
apiVersion: v1  
kind: Service
metadata:
    name: nordport
    namespace: nsci
    labels:
      app: ns-all
spec:
  type: NordPort
  selector:
      app: ns-all     
  ports:
   - protocol: TCP
     port: 80
     targetPort: 80
---
apiVersion: v1  
kind: Service 
metadata:
    name: loadbalancer
    namespace: nsci
    labels:
      app: ns-all
spec:
  type: LoadBalancer
  selector:
      app: ns-all     
  ports:
   - protocol: TCP
     port: 80
     targetPort: 80
                              





      