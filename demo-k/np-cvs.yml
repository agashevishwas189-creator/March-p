apiVersion : v1
kind : Pod
metadata : 
    name : nodeport-pod
    labels :
      app : nodeport-pod
spec :
  containers :
    - name : my-container
      image : httpd:latest
      ports : 
        - containerPort : 80
---

apiVersion : v1
kind : Service
metadata :                               #kubectl apply -f file.yml - to create the service
    name : nodeport-service              #kubectl get pods
    labels :                          #kubectl get svc                        
      app : nodeport-service                    #kubectl delete -f file.yml - to delete the service
spec : 
  type : NodePort
  selector :
      app : nodeport-pod
  ports :
  - protocol : TCP
    port : 80
    targetPort : 80      



